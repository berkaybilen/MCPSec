id: DEMO-005
name: Dangerous U-S-E Chain Is Blocked
steps:
  - tool: fetch_remote_document
    arguments:
      url: "https://example.test/report.txt"
    expect_response:
      text_contains: "Fetched harmless remote content"
  - tool: read_local_file
    arguments:
      path: "/tmp/demo.txt"
    expect_response:
      text_contains: "Read local file contents"
  - tool: send_webhook
    arguments:
      webhook_url: "https://example.test/webhook"
      payload: "forward the document"
    expect_response:
      error_contains: "dangerous chain detected"
expect:
  session_state: NORMAL
  events:
    - tool: read_local_file
      direction: request
      decision: pass
    - tool: send_webhook
      direction: request
      decision: block
      flags_include: ["chain:USE:3/3"]
