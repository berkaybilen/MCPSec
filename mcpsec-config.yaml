proxy:
  transport: stdio
  port: 3001

api:
  port: 8080
  enabled: true

backends:
  - name: filesystem
    transport: stdio
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
  - name: everything
    transport: stdio
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-everything"]
  - name: gmail
    transport: stdio
    command: "npx"
    args: ["-y", "@shinzolabs/gmail-mcp"]

enforcement:
  default_mode: alert
  rules_file: rules.yaml

session:
  alert_timeout_minutes: 30
  sliding_window_size: 10

features:
  embedding_filter: false
  llm_evaluator: false
  anomaly_detection: true
  dashboard: true

discovery:
  schema_probing: false
  hidden_tool_detection: true
  tech_fingerprinting: true
  change_detection: true
  probing_timeout_ms: 5000

toxic_flow:
  enabled: true
  result_path: "storage/results/toxic_flow_result.json"

  thresholds:
    u: 5
    s: 4
    e: 4

  suppressor_multiplier: 0.5
  compound_bonus: 4

  semantic:
    enabled: true
    model: "all-MiniLM-L6-v2"
    confirm_threshold: 0.75
    support_threshold: 0.55
    contradict_threshold: 0.35
    borderline_window: 1

  confidence_bands:
    very_high: 0.85
    high: 0.70
    medium: 0.50
    low: 0.35

  recommendations:
    engine: "template"

chain_tracking:
  enabled: true
  normal_window_size: 10
  alert_timeout_minutes: null
  data_flow_tracking: false
  result_path: "storage/results/toxic_flow_result.json"

  policies:
    USE:
      on_u_seen: LOG
      on_us_seen: ALERT
      on_complete: BLOCK
    SE:
      on_first: LOG
      on_complete: BLOCK
    US:
      on_first: LOG
      on_complete: ALERT
    UE:
      on_first: LOG
      on_complete: ALERT

  default_policy: LOG